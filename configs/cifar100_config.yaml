# =============================================
# CIFAR-100 Configuration
# Sinkhorn OT Knowledge Distillation
# =============================================

dataset:
  name: cifar100
  num_classes: 100
  data_dir: ./data
  num_workers: 4
  pin_memory: true

  # Standard CIFAR augmentation
  augmentation:
    random_crop: 32
    crop_padding: 4
    random_horizontal_flip: true
    normalize:
      mean: [0.5071, 0.4867, 0.4408]
      std: [0.2675, 0.2565, 0.2761]

teacher:
  arch: resnet110
  pretrained_path: ./checkpoints/cifar100_resnet110_teacher.pth
  pretrain_epochs: 200
  pretrain_lr: 0.1
  pretrain_momentum: 0.9
  pretrain_weight_decay: 1.0e-4

student:
  arch: resnet20

training:
  epochs: 200
  batch_size: 128
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  lr_scheduler: cosine
  warmup_epochs: 5

distillation:
  method: adaptive_sinkhorn_kd  # kl_kd | sinkhorn_kd | adaptive_sinkhorn_kd
  temperature: 4.0
  alpha: 0.9           # Weight for KD loss vs CE loss (KL baseline)
  lambda_ot: 0.5       # Weight for OT loss (Sinkhorn methods)

sinkhorn:
  epsilon: 0.05        # Entropic regularization strength
  max_iter: 50         # Max Sinkhorn iterations
  threshold: 1.0e-3    # Convergence threshold
  cost_type: uniform   # uniform | label_distance | random (for fixed cost)

adaptive:
  cost_lr: 0.01                # Learning rate for cost matrix C
  cost_update_freq: 10         # Update C every K training steps
  cost_grad_clip: 1.0          # Gradient clipping for C updates
  val_fraction: 0.1            # Fraction of training data for C validation

logging:
  use_wandb: false
  use_tensorboard: true
  log_dir: ./logs/cifar100
  checkpoint_dir: ./checkpoints/cifar100
  save_freq: 10
  print_freq: 50

seed: 42
num_seeds: 3
